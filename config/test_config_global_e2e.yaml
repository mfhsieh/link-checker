crawler:
  connect_timeout: 5.0
  delay: 3.0
  domain_delays: {}
  external_check_timeout: 10.0
  ignore_extensions:
  - .pdf
  - .doc
  - .docx
  - .xls
  - .xlsx
  - .ppt
  - .pptx
  - .odt
  - .ods
  - .odp
  - .csv
  - .txt
  - .rtf
  - .epub
  - .mobi
  - .jpg
  - .jpeg
  - .png
  - .gif
  - .svg
  - .webp
  - .bmp
  - .ico
  - .tif
  - .tiff
  - .psd
  - .ai
  - .eps
  - .mp4
  - .mp3
  - .avi
  - .mov
  - .wmv
  - .flv
  - .mkv
  - .webm
  - .ogg
  - .wav
  - .m4a
  - .aac
  - .zip
  - .rar
  - .tar
  - .gz
  - .7z
  - .bz2
  - .xz
  - .iso
  - .dmg
  - .pkg
  - .deb
  - .rpm
  - .css
  - .js
  - .json
  - .xml
  - .exe
  - .apk
  - .bin
  - .woff
  - .woff2
  - .ttf
  - .eot
  - .otf
  - .dll
  - .so
  - .class
  - .jar
  ignore_regexes: []
  jitter_ratio: 0.2
  max_connect_timeout: 30.0
  max_content_length: 10485760
  max_delay: 10.0
  max_depth: null
  max_external_check_timeout: 30.0
  max_max_depth: null
  max_max_pages: null
  max_pages: null
  max_redirects: 10
  max_retries: 5
  max_timeout: 60
  mime_type_filter:
    allowed_types:
    - text/html
    - application/xhtml+xml
    enabled: true
  min_connect_timeout: 1.0
  min_delay: 1.0
  min_external_check_timeout: 1.0
  min_retries: 0
  min_timeout: 10
  proxy_url: null
  retries: 3
  social_domains:
  - facebook.com
  - fb.com
  - youtube.com
  - youtu.be
  - instagram.com
  - twitter.com
  - linkedin.com
  - line.me
  ssl_exempt_domains: []
  timeout: 60
  user_agent: null
