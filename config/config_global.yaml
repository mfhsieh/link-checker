crawler:
  delay: 3
  domain_delays: {}
  ignore_extensions:
  - .pdf
  - .doc
  - .docx
  - .xls
  - .xlsx
  - .ppt
  - .pptx
  - .odt
  - .ods
  - .odp
  - .csv
  - .txt
  - .rtf
  - .epub
  - .mobi
  - .jpg
  - .jpeg
  - .png
  - .gif
  - .svg
  - .webp
  - .bmp
  - .ico
  - .tif
  - .tiff
  - .psd
  - .ai
  - .eps
  - .mp4
  - .mp3
  - .avi
  - .mov
  - .wmv
  - .flv
  - .mkv
  - .webm
  - .ogg
  - .wav
  - .m4a
  - .aac
  - .zip
  - .rar
  - .tar
  - .gz
  - .7z
  - .bz2
  - .xz
  - .iso
  - .dmg
  - .pkg
  - .deb
  - .rpm
  - .css
  - .js
  - .json
  - .xml
  - .exe
  - .apk
  - .bin
  - .woff
  - .woff2
  - .ttf
  - .eot
  - .otf
  - .dll
  - .so
  - .class
  - .jar
  ignore_regexes: []
  max_delay: 10
  max_depth: null
  max_pages: null
  max_retries: 5
  max_timeout: 120
  mime_type_filter:
    allowed_types:
    - text/html
    - application/xhtml+xml
    enabled: true
  min_delay: 1
  min_retries: 0
  min_timeout: 15
  proxy_url: null
  retries: 3
  ssl_exempt_domains: []
  timeout: 30
  user_agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML,
    like Gecko) Chrome/120.0.0.0 Safari/537.36
db_url: sqlite:///db/crawler.db
logging:
  console_level: INFO
  file_level: DEBUG
  log_file: log/crawler.log
