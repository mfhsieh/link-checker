# 全域資料庫連線字串
db_url: "sqlite:///db/crawler.db"

# 全域 Logging 日誌輸出層級 (可選：DEBUG, INFO, WARNING, ERROR, CRITICAL)
logging_level: "INFO"

# 爬蟲引擎的全域限制與預設值
crawler:
  # HTTP 請求連線逾時時間的「最小值」限制 (單位：秒)
  # 個別任務設定檔若低於此值，將被強制套用此值，避免因超時設定過短而頻繁失敗
  min_timeout: 30

  # HTTP 請求連線逾時時間的「最大值」限制 (單位：秒)
  # 個別任務設定檔若高於此值，將被強制套用此值，避免單一請求佔用過長等待時間
  max_timeout: 60

  # 每次發送請求前延遲時間的「最小值」限制 (單位：秒)
  # 個別任務設定檔若低於此值，將被強制套用此值，避免過度頻繁請求對目標網站造成攻擊
  min_delay: 3.0

  # 每次發送請求前延遲時間的「最大值」限制 (單位：秒)
  # 個別任務設定檔若高於此值，將被強制套用此值，確保爬蟲任務不會因過度延遲而效率低落
  max_delay: 6.0

  # 預設的 HTTP 請求連線逾時時間 (單位：秒)
  # 若個別任務的 config.yaml 未設定 timeout，將自動套用此全域預設值
  timeout: 30

  # 預設的每次發送請求前延遲時間 (單位：秒)
  # 若個別任務的 config.yaml 未設定 delay，將自動套用此全域預設值
  delay: 3.0

  # 失敗連結的「最小」重試次數限制
  # 個別任務設定檔若低於此值，將被強制套用此值
  min_retries: 0

  # 失敗連結的「最大」重試次數限制
  # 個別任務設定檔若高於此值，將被強制套用此值，避免無止盡的重試
  max_retries: 5

  # 預設的失敗連結重試次數
  # 若個別任務未設定 retries，將自動套用此全域預設值
  retries: 3

  # 預設略過且不進行 HTML 抓取解析的副檔名清單
  # 這些副檔名的連結會與個別任務設定檔中的清單進行聯集合併，以節省系統頻寬與處理資源
  ignore_extensions:
    # 文件
    - ".pdf"
    - ".doc"
    - ".docx"
    - ".xls"
    - ".xlsx"
    - ".ppt"
    - ".pptx"
    - ".csv"
    - ".txt"
    # 圖片
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".svg"
    - ".webp"
    - ".bmp"
    - ".ico"
    # 影音
    - ".mp4"
    - ".mp3"
    - ".avi"
    - ".mov"
    - ".wmv"
    - ".flv"
    # 壓縮檔
    - ".zip"
    - ".rar"
    - ".tar"
    - ".gz"
    - ".7z"
    # 靜態資源與二進位檔
    - ".css"
    - ".js"
    - ".json"
    - ".xml"
    - ".exe"
    - ".apk"
    - ".bin"
    # 字型
    - ".woff"
    - ".woff2"
    - ".ttf"
    - ".eot"
    - ".otf"
    # 更多壓縮檔與映像檔
    - ".bz2"
    - ".xz"
    - ".iso"
    - ".dmg"
    - ".pkg"
    - ".deb"
    - ".rpm"
    # 更多影音檔
    - ".mkv"
    - ".webm"
    - ".ogg"
    - ".wav"
    - ".m4a"
    - ".aac"
    # 更多圖片與設計檔
    - ".tif"
    - ".tiff"
    - ".psd"
    - ".ai"
    - ".eps"
    # 更多文件與電子書
    - ".rtf"
    - ".odt"
    - ".ods"
    - ".odp"
    - ".epub"
    - ".mobi"
    # 程式庫與編譯檔
    - ".dll"
    - ".so"
    - ".class"
    - ".jar"
