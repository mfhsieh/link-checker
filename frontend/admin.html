<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>後台管理 — 外部連結檢查系統</title>
  <meta name="description" content="系統管理員後台：使用者管理、系統配置、操作日誌查閱。" />
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  <link rel="stylesheet" href="/static/css/layout.css" />
</head>
<body>

<div class="app-shell" id="app-shell">

  <!-- ── Top Bar ──────────────────────────────────────────── -->
  <header class="topbar">
    <a class="topbar-brand" href="/app.html">
      <div class="topbar-logo" aria-hidden="true">EL</div>
      <span class="topbar-title">外部連結檢查系統</span>
      <span style="margin-left:0.5rem;font-size:0.75rem;color:var(--text-muted);border:1px solid var(--surface-border);border-radius:9999px;padding:0.125rem 0.5rem">後台</span>
    </a>
    <div class="topbar-actions">
      <a class="btn btn-ghost btn-sm" href="/app.html">← 回前台</a>
      <button class="btn btn-ghost btn-sm" id="logout-btn">登出</button>
    </div>
  </header>

  <!-- ── Sidebar ────────────────────────────────────────── -->
  <nav class="sidebar" aria-label="後台導覽">
    <div class="sidebar-section">
      <div class="sidebar-section-title">後台管理</div>
      <ul class="sidebar-nav">
        <li>
          <a class="sidebar-item active" id="nav-users" href="#/admin/users">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
            </svg>
            使用者管理
          </a>
        </li>
        <li>
          <a class="sidebar-item" id="nav-config" href="#/admin/config">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            系統配置
          </a>
        </li>
        <li>
          <a class="sidebar-item" id="nav-smtp" href="#/admin/smtp">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
            SMTP 設定
          </a>
        </li>
        <li>
          <a class="sidebar-item" id="nav-logs" href="#/admin/logs">
            <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
            </svg>
            操作日誌
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- ── Main Content ────────────────────────────────────── -->
  <main class="main-content" id="main-content">

    <!-- 使用者管理 -->
    <div id="view-users">
      <div class="page-header">
        <div>
          <h1 class="page-title">使用者管理</h1>
          <p class="page-subtitle">管理系統帳號與邀請</p>
        </div>
        <button class="btn btn-primary" id="invite-user-btn">
          <svg viewBox="0 0 20 20" fill="currentColor" style="width:16px;height:16px">
            <path d="M10.75 4.75a.75.75 0 00-1.5 0v4.5h-4.5a.75.75 0 000 1.5h4.5v4.5a.75.75 0 001.5 0v-4.5h4.5a.75.75 0 000-1.5h-4.5v-4.5z" />
          </svg>
          邀請新使用者
        </button>
      </div>
      <div id="users-table-container"></div>
    </div>

    <!-- 系統配置 -->
    <div id="view-config" style="display:none">
      <div class="page-header">
        <div>
          <h1 class="page-title">系統配置</h1>
          <p class="page-subtitle">全域爬蟲參數設定（config_global.yaml）</p>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">目前配置（JSON 格式）</span></div>
        <div class="form-group" style="margin-bottom:1rem">
          <textarea class="form-textarea" id="config-editor" rows="16" spellcheck="false"></textarea>
        </div>
        <div id="config-error" style="color:var(--color-danger-400);font-size:0.875rem;margin-bottom:0.75rem"></div>
        <button class="btn btn-primary" id="save-config-btn">儲存配置</button>
      </div>
    </div>

    <!-- SMTP 設定 -->
    <div id="view-smtp" style="display:none">
      <div class="page-header">
        <div>
          <h1 class="page-title">SMTP 郵件設定</h1>
          <p class="page-subtitle">目前 SMTP 設定（從環境變數讀取，唯讀）</p>
        </div>
      </div>
      <div class="card" style="margin-bottom:1.5rem">
        <div id="smtp-info-container">
          <div class="skeleton" style="height:120px;border-radius:0.5rem"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">測試 SMTP 寄送</span></div>
        <div class="form-group" style="margin-bottom:1rem">
          <label class="form-label" for="smtp-test-email">測試收件者</label>
          <input class="form-input" type="email" id="smtp-test-email" placeholder="admin@example.com" style="max-width:360px" />
        </div>
        <button class="btn btn-primary" id="smtp-test-btn">寄送測試郵件</button>
      </div>
    </div>

    <!-- 操作日誌 -->
    <div id="view-logs" style="display:none">
      <div class="page-header">
        <div>
          <h1 class="page-title">操作日誌</h1>
          <p class="page-subtitle">身分驗證與系統操作事件紀錄</p>
        </div>
      </div>
      <div id="logs-container"></div>
    </div>

  </main>
</div>

<div class="toast-container"></div>

<script type="module">
  import * as api from '/static/js/api.js';
  import { toast } from '/static/js/toast.js';
  import { logout, getCurrentUser } from '/static/js/auth.js';

  // ── 權限驗證 ──────────────────────────────────────────────
  const user = await getCurrentUser();
  if (!user || user.role !== 'admin') {
    window.location.replace('/app.html');
    throw new Error('Non-admin access');
  }

  document.getElementById('logout-btn').addEventListener('click', logout);

  // ── 使用者管理 ────────────────────────────────────────────

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = String(s || '');
    return d.innerHTML;
  }

  async function loadUsers() {
    const container = document.getElementById('users-table-container');
    try {
      const users = await api.get('/api/admin/users');
      if (!users || users.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-title">尚無使用者</div></div>';
        return;
      }
      container.innerHTML = `
        <div class="table-wrapper">
          <table class="table">
            <thead><tr><th>電子郵件</th><th>角色</th><th>狀態</th><th>建立時間</th><th>最後登入</th><th>操作</th></tr></thead>
            <tbody>
              ${users.map(u => `
                <tr>
                  <td>${escapeHtml(u.email)}</td>
                  <td><span class="badge badge-${u.role === 'admin' ? 'admin' : 'pending'}">${u.role === 'admin' ? '管理員' : '使用者'}</span></td>
                  <td><span class="badge badge-${u.status}">${{pending:'待設密',active:'正常',suspended:'已停用',expired:'已過期'}[u.status]||u.status}</span></td>
                  <td class="text-sm text-muted">${u.created_at ? new Date(u.created_at).toLocaleString('zh-TW') : '-'}</td>
                  <td class="text-sm text-muted">${u.last_login_at ? new Date(u.last_login_at).toLocaleString('zh-TW') : '-'}</td>
                  <td>
                    <div style="display:flex;gap:0.5rem">
                      ${u.status !== 'suspended' && u.id !== user.id ? `<button class="btn btn-sm btn-danger" onclick="suspendUser('${u.id}')">停用</button>` : ''}
                      ${u.status === 'suspended' ? `<button class="btn btn-sm btn-secondary" onclick="activateUser('${u.id}')">啟用</button>` : ''}
                      ${['pending','expired'].includes(u.status) ? `<button class="btn btn-sm btn-secondary" onclick="resendInvite('${u.id}')">重寄邀請</button>` : ''}
                      ${u.id !== user.id ? `<button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}', '${escapeHtml(u.email)}')">刪除</button>` : ''}
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    } catch (err) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-desc text-danger">${escapeHtml(err.message)}</div></div>`;
    }
  }

  window.suspendUser = async (userId) => {
    if (!confirm('確定要停用此帳號？該使用者的所有 Session 將立即失效。')) return;
    try {
      await api.patch(`/api/admin/users/${userId}`, { status: 'suspended' });
      toast.success('帳號已停用。');
      await loadUsers();
    } catch (err) { toast.error(err.message); }
  };

  window.activateUser = async (userId) => {
    try {
      await api.patch(`/api/admin/users/${userId}`, { status: 'active' });
      toast.success('帳號已重新啟用。');
      await loadUsers();
    } catch (err) { toast.error(err.message); }
  };

  window.resendInvite = async (userId) => {
    try {
      await api.post(`/api/admin/users/${userId}/resend-invite`);
      toast.success('邀請已重新寄送。');
    } catch (err) { toast.error(err.message); }
  };

  window.deleteUser = async (userId, email) => {
    if (!confirm(`確定要刪除帳號 ${email}？此操作將一併刪除其所有任務資料，且無法復原。`)) return;
    try {
      await api.del(`/api/admin/users/${userId}`);
      toast.success('帳號已刪除。');
      await loadUsers();
    } catch (err) { toast.error(err.message); }
  };

  // 邀請新使用者
  document.getElementById('invite-user-btn').addEventListener('click', () => {
    const email = prompt('請輸入受邀者的電子郵件地址：');
    if (!email) return;
    api.post('/api/admin/users', { email: email.trim().toLowerCase() })
      .then(() => { toast.success(`邀請已寄送至 ${email}。`); loadUsers(); })
      .catch(err => toast.error(err.message));
  });

  // ── 系統配置 ─────────────────────────────────────────────

  async function loadConfig() {
    try {
      const config = await api.get('/api/admin/config');
      document.getElementById('config-editor').value = JSON.stringify(config, null, 2);
    } catch (err) { toast.error('載入配置失敗：' + err.message); }
  }

  document.getElementById('save-config-btn')?.addEventListener('click', async () => {
    const errorEl = document.getElementById('config-error');
    errorEl.textContent = '';
    let parsed;
    try {
      parsed = JSON.parse(document.getElementById('config-editor').value);
    } catch (_) {
      errorEl.textContent = 'JSON 格式錯誤，請檢查語法。';
      return;
    }
    try {
      await api.patch('/api/admin/config', parsed);
      toast.success('配置已儲存。');
    } catch (err) { toast.error(err.message); }
  });

  // ── SMTP ─────────────────────────────────────────────────

  async function loadSmtp() {
    try {
      const smtp = await api.get('/api/admin/smtp');
      const container = document.getElementById('smtp-info-container');
      container.innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem">
          ${[
            ['Host', smtp.host], ['Port', smtp.port],
            ['Username', smtp.username || '(未設定)'],
            ['Password', smtp.password],
            ['From Name', smtp.from_name], ['From Email', smtp.from_email],
            ['TLS', smtp.use_tls ? '✓ 啟用' : '✗ 停用'],
            ['Console Mode', smtp.console_mode ? '✓ 啟用（不實際寄送）' : '✗ 停用'],
          ].map(([k,v]) => `
            <div>
              <div class="text-xs text-muted">${escapeHtml(k)}</div>
              <div class="text-sm font-mono">${escapeHtml(String(v))}</div>
            </div>
          `).join('')}
        </div>
        <div style="margin-top:1rem;padding:0.75rem;background:var(--surface-overlay);border-radius:0.375rem;font-size:0.8125rem;color:var(--text-muted)">
          💡 ${escapeHtml(smtp.note)}
        </div>
      `;
    } catch (err) { toast.error('載入 SMTP 設定失敗。'); }
  }

  document.getElementById('smtp-test-btn')?.addEventListener('click', async () => {
    const email = document.getElementById('smtp-test-email').value.trim();
    if (!email) { toast.warning('請填寫測試收件者 Email。'); return; }
    try {
      await api.post('/api/admin/smtp/test', { to_email: email });
      toast.success('測試郵件已寄送成功！');
    } catch (err) { toast.error(err.message); }
  });

  // ── 操作日誌 ─────────────────────────────────────────────

  let _logPage = 1;

  async function loadLogs(page = 1) {
    _logPage = page;
    const container = document.getElementById('logs-container');
    try {
      const res = await api.get('/api/admin/logs', { page, page_size: 50 });
      const items = res.items || [];
      if (!items.length) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-title">無日誌記錄</div></div>';
        return;
      }
      container.innerHTML = `
        <div class="table-wrapper">
          <table class="table">
            <thead><tr><th>時間</th><th>事件類型</th><th>使用者 ID</th><th>IP</th><th>詳情</th></tr></thead>
            <tbody>
              ${items.map(log => `
                <tr>
                  <td class="text-xs font-mono text-muted">${log.created_at ? new Date(log.created_at).toLocaleString('zh-TW') : '-'}</td>
                  <td><code style="font-size:0.75rem;color:var(--color-brand-400)">${escapeHtml(log.event_type)}</code></td>
                  <td class="text-xs font-mono text-muted">${escapeHtml(log.user_id || '-')}</td>
                  <td class="text-xs font-mono">${escapeHtml(log.ip_address || '-')}</td>
                  <td class="text-xs text-muted">${escapeHtml(log.detail || '-')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    } catch (err) { toast.error('載入日誌失敗：' + err.message); }
  }

  // ── Hash Router ───────────────────────────────────────────

  const views = {
    'users': 'view-users',
    'config': 'view-config',
    'smtp': 'view-smtp',
    'logs': 'view-logs',
  };
  const navItems = { 'users': 'nav-users', 'config': 'nav-config', 'smtp': 'nav-smtp', 'logs': 'nav-logs' };
  const loaders = {
    'users': loadUsers,
    'config': loadConfig,
    'smtp': loadSmtp,
    'logs': () => loadLogs(1),
  };

  async function adminRoute() {
    const hash = window.location.hash || '#/admin/users';
    const match = hash.match(/^#\/admin\/(\w+)/);
    const view = match ? match[1] : 'users';

    Object.entries(views).forEach(([k, v]) => {
      document.getElementById(v).style.display = k === view ? '' : 'none';
    });
    Object.entries(navItems).forEach(([k, v]) => {
      document.getElementById(v)?.classList.toggle('active', k === view);
    });

    if (loaders[view]) await loaders[view]();
  }

  window.addEventListener('hashchange', adminRoute);
  await adminRoute();
</script>

</body>
</html>
