<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>忘記密碼 — 外部連結檢查系統</title>
    <meta name="description" content="申請重設密碼。" />
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/components.css" />
    <link rel="stylesheet" href="/static/css/layout.css" />
</head>

<body>

    <main class="login-page">
        <div class="login-card" role="main" style="max-width:480px">

            <div class="login-logo">
                <div class="login-logo-icon" aria-hidden="true">EL</div>
                <div>
                    <div
                        style="font-size:0.75rem;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase">
                        External Link</div>
                    <div style="font-size:1.125rem;font-weight:700;color:var(--text-primary)">Checker</div>
                </div>
            </div>

            <h1 class="login-heading">忘記密碼</h1>
            <p class="login-subheading" id="forgot-subtitle">
                請輸入您的電子郵件信箱，我們將發送重設密碼的連結給您。
            </p>

            <form class="login-form" id="forgot-password-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="forgot-email">電子郵件 <span class="required">*</span></label>
                    <input class="form-input" type="email" id="forgot-email" name="email" placeholder="user@example.com"
                        required />
                </div>

                <div id="forgot-password-error" role="alert"
                    style="color:var(--color-danger-400);font-size:0.875rem;min-height:1.25rem"></div>
                <div id="forgot-password-success" role="alert"
                    style="color:var(--color-success-400);font-size:0.875rem;min-height:1.25rem;display:none;"></div>

                <button class="btn btn-primary btn-lg" type="submit" id="forgot-password-btn"
                    style="width:100%;margin-top:0.5rem">
                    發送重設連結
                </button>

                <div style="text-align:center;margin-top:1rem;">
                    <a href="/" class="text-link text-sm">返回登入頁面</a>
                </div>
            </form>

        </div>
    </main>

    <div class="toast-container"></div>
    <script type="module">
        import { initForgotPasswordPage } from '/static/js/auth-reset.js';
        initForgotPasswordPage();
    </script>
</body>

</html>
