<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>設定密碼 — 網站連結檢查系統</title>
  <meta name="description" content="首次登入後請設定您的帳號密碼以啟用系統存取權限。" />
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  <link rel="stylesheet" href="/static/css/layout.css" />
</head>
<body>

<main class="login-page" id="set-password-page">
  <div class="login-card" role="main" style="max-width:480px">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon" aria-hidden="true">LC</div>
      <div>
        <div style="font-size:0.75rem;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase">Link</div>
        <div style="font-size:1.125rem;font-weight:700;color:var(--text-primary)">Checker</div>
      </div>
    </div>

    <h1 class="login-heading">設定您的密碼</h1>
    <p class="login-subheading">
      這是您第一次登入系統。請設定一個安全的密碼以啟用您的帳號。
    </p>

    <!-- Password Form -->
    <form class="login-form" id="set-password-form" novalidate>

      <div class="form-group">
        <label class="form-label" for="new-password">新密碼 <span class="required">*</span></label>
        <input
          class="form-input"
          type="password"
          id="new-password"
          name="new_password"
          placeholder="至少 12 個字元"
          autocomplete="new-password"
          required
        />
        <!-- 密碼強度指示器 -->
        <div style="margin-top:0.5rem">
          <div class="progress-bar">
            <div class="progress-fill" id="strength-bar" style="width:0%;transition:width 0.3s,background 0.3s"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:0.25rem">
            <span class="form-hint">密碼強度</span>
            <span class="text-xs font-medium" id="strength-label" style="transition:color 0.3s"></span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-password">確認新密碼 <span class="required">*</span></label>
        <input
          class="form-input"
          type="password"
          id="confirm-password"
          name="confirm_password"
          placeholder="再次輸入密碼"
          autocomplete="new-password"
          required
        />
      </div>

      <!-- 密碼規則說明 -->
      <div class="card-raised" style="font-size:0.8125rem;color:var(--text-muted);padding:1rem;border-radius:0.5rem">
        <div style="font-weight:600;color:var(--text-secondary);margin-bottom:0.5rem">密碼安全要求</div>
        <ul style="list-style:disc;padding-left:1.25rem;display:flex;flex-direction:column;gap:0.25rem">
          <li>至少 12 個字元</li>
          <li>包含大寫字母、小寫字母、數字、特殊符號中的至少三類</li>
          <li>不得與電子郵件帳號相同或包含其中</li>
        </ul>
      </div>

      <!-- Error -->
      <div id="set-password-error" role="alert" style="color:var(--color-danger-400);font-size:0.875rem;min-height:1.25rem"></div>

      <!-- Submit -->
      <button class="btn btn-primary btn-lg" type="submit" id="set-password-btn" style="width:100%;margin-top:0.5rem">
        設定密碼並進入系統
      </button>

    </form>

  </div>
</main>

<div class="toast-container"></div>

<script type="module">
  import { initSetPasswordPage } from '/static/js/auth.js';
  initSetPasswordPage();
</script>

</body>
</html>
