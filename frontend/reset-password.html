<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>重設密碼 — 網站連結檢查系統</title>
    <link rel="stylesheet" href="/static/css/base.css" />
    <link rel="stylesheet" href="/static/css/components.css" />
    <link rel="stylesheet" href="/static/css/layout.css" />
  <link rel="icon" type="image/svg+xml" href="/static/image/logo.svg" />
</head>

<body>

    <main class="login-page">
        <div class="login-card" role="main" style="max-width:480px">

            <div class="login-logo">
                <div class="login-logo-icon" aria-hidden="true" title="Link Checker">
          <img src="/static/image/logo.svg" alt="Link Checker" style="width: 28px; height: 28px;" />
        </div>
                <div>
                    <div
                        style="font-size:0.75rem;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase">
                        Link</div>
                    <div style="font-size:1.125rem;font-weight:700;color:var(--text-primary)">Checker</div>
                </div>
            </div>

            <h1 class="login-heading">重設密碼</h1>
            <p class="login-subheading">請設定您的新密碼。設定完成後其他裝置的登入狀態將會自動登出。</p>

            <form class="login-form" id="reset-password-form" novalidate>
                <div class="form-group">
                    <label class="form-label" for="new-password">新密碼 <span class="required">*</span></label>
                    <input class="form-input" type="password" id="new-password" name="new_password"
                        placeholder="至少 12 個字元" autocomplete="new-password" required />
                    <div style="margin-top:0.5rem">
                        <div class="progress-bar">
                            <div class="progress-fill" id="strength-bar"
                                style="width:0%;transition:width 0.3s,background 0.3s"></div>
                        </div>
                        <div style="display:flex;justify-content:space-between;margin-top:0.25rem">
                            <span class="form-hint">密碼強度</span>
                            <span class="text-xs font-medium" id="strength-label" style="transition:color 0.3s"></span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm-password">確認新密碼 <span class="required">*</span></label>
                    <input class="form-input" type="password" id="confirm-password" name="confirm_password"
                        placeholder="再次輸入密碼" autocomplete="new-password" required />
                </div>

                <div class="pwd-rules-box">
                    <div class="pwd-rules-title">密碼安全要求</div>
                    <ul class="pwd-rules-list">
                        <li>至少 12 個字元。</li>
                        <li>至少包含大寫、小寫、數字、特殊符號中的 3 類。</li>
                        <li>不得包含電子郵件帳號名稱 (@ 之前的字串) 或被包含於其中。</li>
                    </ul>
                </div>

                <div id="reset-password-error" role="alert"
                    style="color:var(--color-danger-400);font-size:0.875rem;min-height:1.25rem"></div>
                <button class="btn btn-primary btn-lg" type="submit" id="reset-password-btn"
                    style="width:100%;margin-top:0.5rem">重設密碼並登入</button>
            </form>
        </div>
    </main>
    <script type="module">
        import { initResetPasswordPage } from '/static/js/auth-reset.js';
        initResetPasswordPage();
    </script>
</body>

</html>
